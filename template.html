<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
      color: #1a1a2e;
      background: #eef2f7;
      padding: 2rem;
    }
    #content {
      max-width: 980px;
      margin: 0 auto;
      background: #ffffff;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }
    h1 { margin-bottom: 1rem; font-size: 1.8rem; }
    h2 { margin-top: 1.5rem; margin-bottom: 0.5rem; }
    h3 { margin-top: 1.2rem; margin-bottom: 0.4rem; }
    p  { margin-bottom: 1rem; }
    a  { color: #5c6bc0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul, ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    li { margin-bottom: 0.35rem; }
    code {
      background: #eef;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
    }
    pre {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    pre code {
      background: none;
      padding: 0;
      color: inherit;
    }
    input[type="checkbox"] {
      margin-right: 0.4rem;
    }
    header {
      margin-bottom: 2rem;
    }
    form {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0.7rem 0.8rem;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #334155;
      color: white;
      padding: 0.7rem 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin: 1rem 0 2rem;
    }
    .note-card {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 1rem;
      background: #f8fafc;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      color: #64748b;
      font-size: 0.85rem;
    }
    .pill {
      background: #dbeafe;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 0.1rem 0.45rem;
    }
  </style>
</head>
<body>
  <div id="content"></div>
</body>
</html>
